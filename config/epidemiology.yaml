# Ластівка — РЕАЛЬНА епідеміологія дитячих даних України (з дослідження, 50 агентів).
# Джерела: Держстат, UNICEF SitAn 2024, OHCHR, Мінсоц, НСЗУ, МОН, childrenofwar.gov.ua, ILO.
# Принцип: БІЛЬШІСТЬ ДІТЕЙ БЕЗ ПОРУШЕНЬ. Фонові фактори (бідність, ВПО, дистанційка) поширені,
# але це НЕ порушення прав. Порушення рідкісні й виникають УМОВНО від латентних факторів.

population:
  child_total: 5200000        # резидентних дітей 0-17 на підконтрольній території (UNICEF 2024)
  note: "7.35 млн — довоєнна база (Держстат 01.2022); скоротилось ~26%"

# ── Демографія (реальні розподіли) ──
demographics:
  age_bands:                  # частки за віком
    "0-2": 0.13
    "3-5": 0.16
    "6-10": 0.30
    "11-14": 0.24
    "15-17": 0.17
  sex: {MALE: 0.513, FEMALE: 0.487}
  urban_rural: {urban: 0.63, rural: 0.37}
  oblast_weights:             # за ФАКТИЧНИМ проживанням (з урахуванням припливу ВПО)
    Дніпропетровська: 0.09
    Київська: 0.12
    Львівська: 0.07
    Харківська: 0.06
    Одеська: 0.06
    Вінницька: 0.04
    Полтавська: 0.04
    Запорізька: 0.04
    Закарпатська: 0.035
    Івано-Франківська: 0.03
    Хмельницька: 0.035
    Чернівецька: 0.03
    Волинська: 0.03
    Рівненська: 0.03
    Тернопільська: 0.025
    Кіровоградська: 0.025
    Черкаська: 0.03
    Житомирська: 0.03
    Миколаївська: 0.03
    Сумська: 0.025
    Чернігівська: 0.025
    Донецька: 0.04
    Херсонська: 0.02
    Луганська: 0.015

# ── Латентні КОНТЕКСТ-фактори (поширені; НЕ порушення самі по собі) ──
context:
  geo_tier:                   # географія ризику (за фактичним проживанням)
    rear: 0.55                # тил
    hosting: 0.20             # приймаючий хаб
    frontline: 0.15           # прифронтова
    deoccupied: 0.06          # деокупована
    occupied: 0.04            # ТОТ (мало в резидентній вибірці)
  idp_rate: 0.12              # дитина-ВПО (12-15%)
  poverty:                    # рівень бідності домогосподарства
    ok: 0.35
    poor: 0.45                # широка монетарна/матеріальна (фон воєнного часу)
    deep: 0.20                # глибока одночасна
  family:
    intact: 0.695
    single_parent: 0.18
    many_children: 0.10
    guardianship: 0.015       # під опікою
    no_parental_care: 0.010   # сирота/ПБП (~1%)
  parental:                   # стресори батьків (можуть накладатись)
    unemployment: 0.10
    addiction: 0.035          # алко/нарко залежність
    disability: 0.03
  child_disability: 0.022     # дитина з інвалідністю (2.2-2.7%)
  child_chronic: 0.08         # хронічне захворювання

# Кореляції між контекст-факторами (умовні корективи при семплуванні)
context_links:
  frontline_idp_mult: 2.2     # прифронт/деокуповані → частіше ВПО
  poverty_unemployment_mult: 2.0
  deep_poverty_addiction_mult: 1.8
  disability_poverty_mult: 1.4

# ── ПОРУШЕННЯ (рідкісні). P = base × Π(множники наявних факторів), clamp(0..cap). ──
# Більшість дітей: жоден ризик не випадає. cap не дає виходити за реалізм.
violations:
  cap: 0.85
  W3_out_of_education:        # поза освітою / тривалий відсів
    base: 0.012
    mult: {idp: 3.0, deep: 2.2, child_disability: 2.5, frontline: 2.0, occupied: 4.0, rural: 1.4}
  W8_medical_access:         # обрив доступу до медицини (за наявності потреби)
    base: 0.010
    mult: {idp: 2.5, frontline: 2.0, occupied: 3.0, child_chronic: 3.0}
  W2_psych_trauma:           # зафіксований психічний розлад (дистрес поширений, розлад рідший)
    base: 0.023
    mult: {idp: 2.0, frontline: 2.0, war_loss: 3.0, bullying: 2.5, dv_household: 2.0}
  W6_orphanhood:             # сирітство/втрата піклування (переважно статус)
    base: 0.009
    mult: {frontline: 2.0, deoccupied: 2.0, occupied: 2.5}
  W5_deportation:            # депортація/примусове переміщення [immediate]
    base: 0.0026
    mult: {no_parental_care: 5.0, occupied: 6.0, deoccupied: 2.0}
  W7_trafficking:            # торгівля людьми [immediate] (рідкісна, концентрована)
    base: 0.0006
    mult: {idp: 2.0, no_breadwinner: 4.0, no_parental_care: 3.0}
  F3_neglect:                # нехтування потребами
    base: 0.020
    mult: {deep: 3.0, poor: 1.6, addiction: 2.5, many_children: 1.5, parental_disability: 1.4}
  P1_physical_home:          # фізичне насильство вдома (зафіксоване рідкісне, латентне ширше)
    base: 0.009
    mult: {addiction: 3.0, dv_household: 4.0, single_parent: 1.3, deep: 1.4}
  F6_sexual_abuse:           # сексуальне насильство [immediate] (<0.001% задокументовано)
    base: 0.0008
    mult: {dv_household: 2.0, no_parental_care: 2.0}
  E1_bullying:               # систематична віктимізація булінгом (детектована форма)
    base: 0.055
    mult: {war_exposure: 3.0, child_disability: 1.6, idp: 1.5}
  F4_child_labor:            # дитяча праця (економічна експлуатація)
    base: 0.028
    mult: {deep: 2.5, poor: 1.5, rural: 2.0}
  E4_inclusion:              # обмеження доступу до інклюзивної освіти
    base: 0.30               # умовно, ЛИШЕ якщо є інвалідність (застосовується в коді)
    mult: {frontline: 1.5, rural: 1.5, idp: 1.4}
  W9_identity:               # порушення права на ідентичність (документи/житло)
    base: 0.004
    mult: {occupied: 4.0, deoccupied: 3.0, no_parental_care: 3.0, idp: 1.5}
  F1_psych_violence:         # психологічне насильство в сім'ї
    base: 0.012
    mult: {dv_household: 3.0, addiction: 2.0, single_parent: 1.3, deep: 1.4}

# Допоміжні «прапорці», що виводяться з контексту для множників вище
derived_flags_note: >
  war_loss = (no_parental_care або orphanhood) і війна; dv_household = P1 або наявне ДН;
  war_exposure = geo_tier in (frontline,deoccupied,occupied); no_breadwinner = unemployment у неповній сім'ї.

# ── Крос-кордон Україна → Естонія (тимчасовий захист) ──
crossborder_ee:
  abroad_rate: 0.05           # частка дітей-біженців у Естонії (×війна)
  war_mult: 2.2               # підвищення для дітей із зон бойових дій
  ee_registered: 0.90         # реєстрація проживання (Rahvastikuregister) після прибуття
  ee_in_school: 0.60          # зарахування в естонську школу (EHIS) — решта = освітній розрив
  ee_in_health: 0.55          # мед. прикріплення (Tervise infosüsteem)
  ee_gets_benefit: 0.70       # дитяча допомога (SKAIS)
  uasc_rate: 0.04             # неповнолітні без супроводу (UASC)
  name_variation: 0.5         # розбіжність транслітерації імені на естонському боці

# Очікувані сумарні орієнтири (для валідації):
validation_targets:
  clean_children_pct: [0.55, 0.68]     # без жодного порушення
  idp_pct: [0.11, 0.16]
  orphan_pct: [0.007, 0.012]
  deported_pct: [0.0015, 0.004]
  disability_pct: [0.02, 0.03]
