# Ластівка — конфіг генерації синтетичної популяції та реєстрів
seed: 42

population:
  n_children: 5000          # розмір популяції (старт; масштабовано до 50k/500k)
  months: 24                # довжина симуляції (T)
  start_year: 2023          # перший місяць симуляції = січень start_year
  min_age: 3                # вік дитини на початок симуляції
  max_age: 17

# Частка дітей із підсадженим порушенням (решта — фон)
violation_rate: 0.18

# Розподіл шоків серед флагнутих дітей (з офіційних часток; нормалізується)
shock_weights:
  displacement: 32          # W1 (+W3,W8)
  out_of_education: 16      # W3 окремо
  psych_trauma: 14          # W2
  orphanhood: 7             # W6
  deportation: 6            # W5  [immediate]
  trafficking: 4            # W7  [immediate]
  neglect: 18               # F3
  physical_abuse_home: 22   # P1/F2
  bullying: 20              # E1
  sexual_abuse: 4           # F6  [immediate]

# Рівні шуму / реалізм (критично для чесного матчингу)
noise:
  no_rnokpp_rate: 0.18      # частка дітей без РНОКПП (no_tax_id)
  no_unzr_rate: 0.07        # частка ЗАПИСІВ без УНЗР (хаос, гарячі лінії) -> fuzzy
  name_variation_rate: 0.45 # опечатки/варіанти ПІБ у записах
  missing_record_rate: 0.05 # реєстр не зловив подію
  duplicate_rate: 0.03      # дубль запису

oblasts:
  - Київська
  - Харківська
  - Львівська
  - Дніпропетровська
  - Одеська
  - Запорізька
  - Донецька
  - Полтавська
  - Вінницька
  - Чернігівська
