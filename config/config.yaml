# Ластівка — конфіг генерації. Епідеміологія (base rates, кореляції, демографія)
# та схеми порушень — у config/epidemiology.yaml.
seed: 42

population:
  n_children: 5000          # розмір популяції (масштабовано до 50k/500k)
  months: 24                # довжина симуляції (T), місяців
  start_year: 2023          # перший місяць = січень start_year
  min_age: 3
  max_age: 17

# Рівні шуму / реалізм (критично для чесного матчингу)
noise:
  no_rnokpp_rate: 0.18      # частка дітей без РНОКПП (no_tax_id; типово немовлята)
  no_unzr_rate: 0.07        # частка ЗАПИСІВ без УНЗР -> fuzzy-матчинг
  name_variation_rate: 0.45 # опечатки/варіанти ПІБ у записах
  missing_record_rate: 0.05 # реєстр не зловив подію
  duplicate_rate: 0.03      # дубль запису

# Області (для вибору напрямку переміщення ВПО; розподіл проживання — в epidemiology.yaml)
oblasts:
  - Київська
  - Харківська
  - Львівська
  - Дніпропетровська
  - Одеська
  - Запорізька
  - Донецька
  - Полтавська
  - Вінницька
  - Чернігівська
  - Закарпатська
  - Івано-Франківська
